<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Despacho de Jabas</title>

<!-- CSS general del sitio -->
<link rel="stylesheet" href="css/style.css">

<!-- CSS específico de esta página -->
<link rel="stylesheet" href="css/despacho.css">

</head>

<body>

<header class="main-header">

<div class="logo">

<img src="img/logo.png">

<div>
<h2>Procesadora Laran</h2>
<p>Carrera C.</p>
</div>

</div>

<nav class="menu">

<a href="index.html" class="activo">Inicio</a>

</nav>

</header>


<section class="hero-sistema">

<div class="hero-contenido">

<div class="hero-texto">

<h1>Despacho de Jabas</h1>

<p>
Registro y control de despacho de jabas hacia los diferentes fundos.
</p>

</div>

<div class="hero-img">

<img src="img/imp3.jpg">

</div>

</div>

</section>


<!-- CONTENEDOR PRINCIPAL DEL SISTEMA -->
<section class="contenedor-despacho">


<div class="panel-control">

<!-- FILTROS -->
<div class="filtros">

<input type="date" id="buscarFecha">

<input type="text" id="buscarProveedor" placeholder="Proveedor">

<input type="text" id="buscarFundo" placeholder="Fundo">

</div>


<!-- BOTONES -->
<div class="acciones">

<button id="limpiarFiltros">
🧹 Limpiar
</button>

<button id="exportarExcel">
📥 Exportar
</button>

</div>


<!-- ESTADISTICAS -->
<div class="estadisticas">

<div class="card">
<h3 id="totalCamiones">0</h3>
<p>Camiones registrados</p>
</div>

<div class="card">
<h3 id="totalJabas">0</h3>
<p>Jabas despachadas</p>
</div>

</div>

</div>



<!-- AREA DONDE VA LA TABLA -->
<div class="area-tabla">

<div class="tabla">

<table>

<thead>

<tr>
<th>FECHA</th>
<th>PLACA</th>
<th>CHOFER</th>
<th>TIPO DE JABA</th>
<th>PROVEEDOR</th>
<th>FUNDO</th>
<th>CANTIDAD</th>
<th>PALETS</th>
<th>SOBRANTES</th>
</tr>

</thead>

<tbody id="tablaDatos">

<!-- MENSAJE MIENTRAS CARGA FIREBASE -->
<tr>
<td colspan="9">Cargando datos...</td>
</tr>

</tbody>

</table>


</div>

</section>





<!-- LIBRERIAS DE FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- SCRIPT DE TU SISTEMA -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/despacho.js"></script>

</body>
</html>
